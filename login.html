<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - أكاديمية الإنجليزية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8">

    <!-- تبديل بين دخول وإنشاء حساب -->
    <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
      <button id="tab-login" onclick="showTab('login')"
        class="flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-teal-600">
        تسجيل الدخول
      </button>
      <button id="tab-register" onclick="showTab('register')"
        class="flex-1 py-2 rounded-lg text-sm font-bold transition-all text-gray-500">
        إنشاء حساب
      </button>
    </div>

    <!-- فورم تسجيل الدخول -->
    <div id="form-login">
      <h2 class="text-xl font-bold text-gray-800 mb-5 text-center">أهلاً بك 👋</h2>
      <div class="space-y-4">
        <input id="login-email" type="email" placeholder="البريد الإلكتروني"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
        
        <div class="relative">
          <input id="login-password" type="password" placeholder="كلمة المرور"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
          <span id="login-eye" onclick="togglePass('login-password', 'login-eye')"
            class="absolute left-4 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500 text-lg select-none">
            👁️
          </span>
        </div>

        <p id="login-error" class="text-red-500 text-xs text-center hidden"></p>
        <button onclick="handleLogin()"
          class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-xl font-bold transition-all">
          دخول
        </button>
      </div>
    </div>

    <!-- فورم إنشاء حساب جديد -->
    <div id="form-register" class="hidden">
      <h2 class="text-xl font-bold text-gray-800 mb-5 text-center">إنشاء حساب جديد</h2>
      <div class="space-y-4">
        <input id="reg-name" type="text" placeholder="الاسم الكامل"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
        <input id="reg-email" type="email" placeholder="البريد الإلكتروني"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
        
        <div class="relative">
          <input id="reg-password" type="password" placeholder="كلمة المرور (6 أحرف على الأقل)"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
          <span id="reg-eye1" onclick="togglePass('reg-password', 'reg-eye1')"
            class="absolute left-4 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500 text-lg select-none">
            👁️
          </span>
        </div>

        <div class="relative">
          <input id="reg-password2" type="password" placeholder="تأكيد كلمة المرور"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
          <span id="reg-eye2" onclick="togglePass('reg-password2', 'reg-eye2')"
            class="absolute left-4 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500 text-lg select-none">
            👁️
          </span>
        </div>

        <p id="reg-error" class="text-red-500 text-xs text-center hidden"></p>
        <p id="reg-success" class="text-teal-600 text-xs text-center hidden">✅ تم التسجيل! سجل دخولك دلوقتي.</p>
        <button onclick="handleRegister()"
          class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-xl font-bold transition-all">
          إنشاء الحساب
        </button>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-5">
      <a href="index.html" class="text-teal-500 hover:underline">← العودة للصفحة الرئيسية</a>
    </p>
  </div>

  <script>
    // 1. وظيفة التبديل بين تسجيل الدخول وإنشاء الحساب
    function showTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('form-login').classList.toggle('hidden', !isLogin);
        document.getElementById('form-register').classList.toggle('hidden', isLogin);
        
        // تغيير استايل الزراير
        document.getElementById('tab-login').className = isLogin 
            ? 'flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-teal-600' 
            : 'flex-1 py-2 rounded-lg text-sm font-bold transition-all text-gray-500';
            
        document.getElementById('tab-register').className = !isLogin 
            ? 'flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-teal-600' 
            : 'flex-1 py-2 rounded-lg text-sm font-bold transition-all text-gray-500';
    }

    // 2. وظيفة إظهار وإخفاء الباسورد
    function togglePass(inputId, eyeId) {
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        if (input.type === 'password') {
            input.type = 'text';
            eye.textContent = '🙈';
        } else {
            input.type = 'password';
            eye.textContent = '👁️';
        }
    }

    // 3. معالجة تسجيل الدخول
    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        
        errorEl.classList.add('hidden');

        try {
            const res = await fetch('/api/auth-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('auth_name', data.name);
                localStorage.setItem('auth_email', data.email);
                window.location.href = 'dashboard.html';
            } else {
                errorEl.textContent = data.error || 'بيانات الدخول غير صحيحة';
                errorEl.classList.remove('hidden');
            }
        } catch {
            errorEl.textContent = 'فشل الاتصال بالسيرفر';
            errorEl.classList.remove('hidden');
        }
    }

    // 4. معالجة إنشاء الحساب
    async function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;
        const errorEl = document.getElementById('reg-error');
        const successEl = document.getElementById('reg-success');

        errorEl.classList.add('hidden');
        successEl.classList.add('hidden');

        if (!name || !email || password.length < 6) {
            errorEl.textContent = 'يرجى ملء كافة البيانات (الباسورد 6 أحرف على الأقل)';
            errorEl.classList.remove('hidden');
            return;
        }

        if (password !== password2) {
            errorEl.textContent = 'كلمتا المرور غير متطابقتين';
            errorEl.classList.remove('hidden');
            return;
        }

        try {
            const res = await fetch('/api/auth-register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (data.success) {
                successEl.classList.remove('hidden');
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-email').value = '';
                setTimeout(() => showTab('login'), 1500);
            } else {
                errorEl.textContent = data.error || 'هذا الحساب موجود بالفعل';
                errorEl.classList.remove('hidden');
            }
        } catch {
            errorEl.textContent = 'حدث خطأ أثناء التسجيل';
            errorEl.classList.remove('hidden');
        }
    }
  </script>
</body>
</html>
