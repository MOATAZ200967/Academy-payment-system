<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حسابي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
    <span class="font-bold text-teal-600 text-lg">English Academy</span>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-gray-600"></span>
      <button onclick="handleLogout()"
        class="text-sm text-red-500 hover:text-red-700 font-bold transition-all">
        تسجيل الخروج
      </button>
    </div>
  </nav>

  <!-- المحتوى -->
  <div class="max-w-2xl mx-auto p-6 space-y-5">

    <!-- رسالة تحميل -->
    <div id="loading" class="text-center py-16 text-gray-400">
      <div class="text-4xl mb-3">⏳</div>
      <p>جاري تحميل بياناتك...</p>
    </div>

    <!-- الداشبورد الحقيقي (مخفي لحد ما يتحمل) -->
    <div id="content" class="hidden space-y-5">

      <!-- كارت الترحيب -->
      <div class="bg-gradient-to-l from-teal-500 to-teal-700 rounded-2xl p-6 text-white">
        <p class="text-teal-100 text-sm mb-1">أهلاً بك 👋</p>
        <h2 id="welcome-name" class="text-2xl font-bold"></h2>
        <p id="welcome-email" class="text-teal-200 text-sm mt-1"></p>
      </div>

      <!-- كارت الاشتراك (لو مشترك) -->
      <div id="sub-active" class="hidden bg-white rounded-2xl shadow-sm p-6 border border-teal-100">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 bg-teal-100 rounded-full flex items-center justify-center text-teal-600 font-bold">✓</div>
          <div>
            <p class="font-bold text-gray-800">اشتراكك الحالي</p>
            <p class="text-xs text-gray-400">نشط</p>
          </div>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-gray-500">الباقة:</span>
            <span id="sub-package" class="font-bold text-teal-600"></span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-gray-500">المبلغ المدفوع:</span>
            <span id="sub-amount" class="font-bold text-gray-800"></span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-gray-500">تاريخ الاشتراك:</span>
            <span id="sub-date" class="text-gray-800"></span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-gray-500">رقم الطلب:</span>
            <span id="sub-orderid" class="font-mono text-xs text-gray-500"></span>
          </div>
        </div>
      </div>

      <!-- كارت لو مش مشترك -->
      <div id="sub-none" class="hidden bg-white rounded-2xl shadow-sm p-6 border border-gray-100 text-center">
        <div class="text-4xl mb-3">📚</div>
        <p class="font-bold text-gray-700 mb-1">مش مشترك في أي كورس لحد دلوقتي</p>
        <p class="text-sm text-gray-400 mb-4">اختار الباقة المناسبة وابدأ رحلتك!</p>
        <a href="index.html#packages"
          class="inline-block bg-teal-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-teal-700 transition-all text-sm">
          شوف الباقات
        </a>
      </div>

    </div>

    <!-- رسالة خطأ -->
    <div id="error-msg" class="hidden text-center py-10 text-red-400">
      <p id="error-text"></p>
      <button onclick="window.location.href='login.html'"
        class="mt-3 text-sm text-teal-500 hover:underline">
        سجل دخولك تاني
      </button>
    </div>

  </div>

<!-- الجزء الخاص بالـ JavaScript داخل ملف dashboard.html -->
<script>
    const token = localStorage.getItem('auth_token');

    // لو مفيش token، ارجع لصفحة اللوجن فوراً
    if (!token) {
        window.location.href = 'login.html';
    }

    async function loadDashboard() {
        try {
            const res = await fetch('/api/auth-dashboard', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            document.getElementById('loading').classList.add('hidden');

            if (!data.success) {
                handleLogout(); // لو التوكن منتهي أو غير صالح
                return;
            }

            // عرض البيانات الأساسية
            document.getElementById('user-name').textContent = data.name;
            document.getElementById('welcome-name').textContent = data.name;
            document.getElementById('welcome-email').textContent = data.email;
            document.getElementById('content').classList.remove('hidden');

            // فحص حالة الاشتراك
            const sub = data.subscription;
            // التحقق: هل يوجد اشتراك؟ وهل تاريخ الانتهاء أكبر من تاريخ النهاردة؟
            const isActive = sub && sub.expiry_date && (new Date(sub.expiry_date) > new Date());

            if (isActive) {
                document.getElementById('sub-active').classList.remove('hidden');
                document.getElementById('sub-none').classList.add('hidden');
                
                document.getElementById('sub-package').textContent = sub.package_name;
                document.getElementById('sub-amount').textContent = `${sub.amount} ج.م`;
                document.getElementById('sub-date').textContent = new Date(sub.date).toLocaleDateString('ar-EG');
                document.getElementById('sub-orderid').textContent = sub.order_id;
            } else {
                document.getElementById('sub-active').classList.add('hidden');
                document.getElementById('sub-none').classList.remove('hidden');
            }

        } catch (error) {
            console.error("Dashboard Load Error:", error);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-msg').classList.remove('hidden');
            document.getElementById('error-text').textContent = 'حدث خطأ في الاتصال بالسيرفر';
        }
    }

    function handleLogout() {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('auth_name');
        localStorage.removeItem('auth_email');
        window.location.href = 'login.html';
    }

    loadDashboard();
</script>
</body>
</html>
