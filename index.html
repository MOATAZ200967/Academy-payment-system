<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Academy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* ==========================================
           CSS الخاص بحركة القائمة الجانبية (Drawer)
           ========================================== */
        .nav-drawer {
            transform: translateX(100%); /* البداية للعربي (مخفية يمين) */
            transition: transform 0.3s ease-in-out;
        }

        /* تعديل الاتجاه لو اللغة إنجليزي */
        [dir="ltr"] .nav-drawer {
            transform: translateX(-100%); /* مخفية يسار */
        }

        /* إظهار القائمة */
        .nav-drawer.active,
        [dir="ltr"] .nav-drawer.active {
            transform: translateX(0);
        }

        /* إظهار الغطاء الشفاف */
        #nav-overlay.active {
            display: block;
        }
    </style>
</head>
<body class="bg-[#151515] text-white font-sans">

    <!-- ==========================================
         HTML الخاص بالـ Navbar
         ========================================== -->
    <nav class="bg-[#151515] text-white border-b border-[#00f2fe] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">

                <!-- 1. اللوجو (Logo) -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="#" class="text-2xl font-bold text-[#00f2fe]">English Academy</a>
                </div>

                <!-- 2. زر الموبايل والتابلت (Hamburger Menu) -->
                <div class="flex items-center lg:hidden gap-4">
                    <button id="lang-toggle-mobile" class="text-xl hover:text-[#00f2fe] transition">🌐</button>
                    <button id="hamburger-btn" class="text-gray-300 hover:text-white focus:outline-none" aria-expanded="false">
                        <svg class="h-8 w-8" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>

                <!-- 3. روابط القائمة للديسكتوب (Desktop Menu) -->
                <div class="hidden lg:flex lg:flex-1 lg:items-center lg:justify-between ms-8">
                    <ul class="flex flex-row gap-6 items-center">
                        <li><a href="#packages" data-i18n="nav-packages" class="text-sm font-medium hover:text-[#00f2fe] transition">الكورسات</a></li>
                        <li><a href="#compare" data-i18n="nav-compare" class="text-sm font-medium hover:text-[#00f2fe] transition">مقارنة الكورسات</a></li>
                        <li><a href="#faq" data-i18n="nav-faq" class="text-sm font-medium hover:text-[#00f2fe] transition">الأسئلة الشائعة</a></li>
                        <li><a href="#contact" data-i18n="nav-contact" class="text-sm font-medium hover:text-[#00f2fe] transition">تواصل معنا</a></li>
                    </ul>

                    <!-- 4. الأزرار الجانبية -->
                    <div class="flex items-center gap-4 ms-auto">
                        <button id="lang-toggle" class="text-xl hover:text-[#00f2fe] transition hidden md:block">🌐</button>
                        <a href="#login" data-i18n="nav-auth-login" class="bg-[#00f2fe] text-black font-bold py-2 px-4 rounded hover:bg-white transition-colors flex items-center gap-2">
                            👤 تسجيل الدخول
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5. قائمة الموبايل والتابلت الجانبية (Mobile Drawer) -->
        <div id="nav-links" class="fixed inset-y-0 start-0 z-50 w-64 bg-[#151515] border-e border-[#00f2fe] shadow-xl nav-drawer">
            <div class="flex flex-col h-full px-4 pt-6 pb-4 overflow-y-auto">
                <div class="flex items-center justify-between mb-8">
                    <span class="text-xl font-bold text-[#00f2fe]">القائمة</span>
                    <button id="close-menu-btn" class="text-gray-400 hover:text-white">
                        <svg class="h-6 w-6" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                
                <div class="space-y-2 flex-1">
                    <a href="#packages" data-i18n="nav-packages" class="block px-3 py-3 rounded-md text-base font-medium hover:bg-gray-800 hover:text-[#00f2fe]">الكورسات</a>
                    <a href="#compare" data-i18n="nav-compare" class="block px-3 py-3 rounded-md text-base font-medium hover:bg-gray-800 hover:text-[#00f2fe]">مقارنة الكورسات</a>
                    <a href="#faq" data-i18n="nav-faq" class="block px-3 py-3 rounded-md text-base font-medium hover:bg-gray-800 hover:text-[#00f2fe]">الأسئلة الشائعة</a>
                    <a href="#contact" data-i18n="nav-contact" class="block px-3 py-3 rounded-md text-base font-medium hover:bg-gray-800 hover:text-[#00f2fe]">تواصل معنا</a>
                </div>
                
                <div class="mt-auto pt-6 border-t border-gray-800">
                    <a href="#login" data-i18n="nav-auth-login" class="w-full text-center bg-[#00f2fe] text-black font-bold py-3 px-4 rounded hover:bg-white transition-colors block">
                        👤 تسجيل الدخول
                    </a>
                </div>
            </div>
        </div>

        <!-- الغطاء الشفاف (Overlay) -->
        <div id="nav-overlay" class="fixed inset-0 bg-black bg-opacity-70 z-40 hidden"></div>
    </nav>

    <!-- ==========================================
         JavaScript (المنطق البرمجي بالكامل)
         ========================================== -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. القاموس (Translations)
            const translations = {
                ar: {
                    "nav-packages": "الكورسات",
                    "nav-compare": "مقارنة الكورسات",
                    "nav-faq": "الأسئلة الشائعة",
                    "nav-contact": "تواصل معنا",
                    "nav-auth-login": "👤 تسجيل الدخول"
                },
                en: {
                    "nav-packages": "Courses",
                    "nav-compare": "Course Comparison",
                    "nav-faq": "FAQ",
                    "nav-contact": "Contact Us",
                    "nav-auth-login": "👤 Login"
                }
            };

            // 2. تغيير اللغة (Language Toggle)
            const langToggleBtn = document.getElementById("lang-toggle");
            const langToggleMobileBtn = document.getElementById("lang-toggle-mobile");
            let currentLang = "ar";

            function setLanguage(lang) {
                currentLang = lang;
                document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
                document.documentElement.setAttribute("lang", lang);

                document.querySelectorAll("[data-i18n]").forEach(element => {
                    const key = element.getAttribute("data-i18n");
                    if (translations[lang] && translations[lang][key]) {
                        element.innerHTML = translations[lang][key];
                    }
                });
            }

            function toggleLanguage() {
                const nextLang = currentLang === "ar" ? "en" : "ar";
                setLanguage(nextLang);
            }

            if (langToggleBtn) langToggleBtn.addEventListener("click", toggleLanguage);
            if (langToggleMobileBtn) langToggleMobileBtn.addEventListener("click", toggleLanguage);

            setLanguage("ar"); // اللغة الافتراضية

            // 3. التحكم في القائمة الجانبية (Hamburger Menu)
            const hamburgerBtn = document.getElementById("hamburger-btn");
            const closeMenuBtn = document.getElementById("close-menu-btn");
            const navLinks = document.getElementById("nav-links");
            const navOverlay = document.getElementById("nav-overlay");

            function openMenu() {
                hamburgerBtn.classList.add("active");
                navLinks.classList.add("active");
                if (navOverlay) navOverlay.classList.add("active");
                hamburgerBtn.setAttribute("aria-expanded", "true");
                document.body.style.overflow = "hidden"; // منع التمرير في الخلفية
            }

            function closeMenu() {
                hamburgerBtn.classList.remove("active");
                navLinks.classList.remove("active");
                if (navOverlay) navOverlay.classList.remove("active");
                hamburgerBtn.setAttribute("aria-expanded", "false");
                document.body.style.overflow = ""; // استعادة التمرير
            }

            if (hamburgerBtn) {
                hamburgerBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const isActive = navLinks.classList.contains("active");
                    isActive ? closeMenu() : openMenu();
                });
            }

            if (closeMenuBtn) closeMenuBtn.addEventListener("click", closeMenu);
            if (navOverlay) navOverlay.addEventListener("click", closeMenu);

            // إغلاق القائمة عند الضغط على أي رابط بداخلها
            if (navLinks) {
                navLinks.querySelectorAll("a").forEach(link => {
                    link.addEventListener("click", closeMenu);
                });
            }

            // إغلاق القائمة عند تغيير حجم الشاشة (Resize)
            window.addEventListener("resize", () => {
                if (window.innerWidth >= 1024 && navLinks.classList.contains("active")) {
                    closeMenu();
                }
            });

        });
    </script>
</body>
</html>
